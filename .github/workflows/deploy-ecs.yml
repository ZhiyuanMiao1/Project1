name: Deploy to ECS                                                  # 工作流名称

on:                                                                  # 触发条件
  push:                                                              # 触发事件：push
    branches:                                                        # 监听分支
      - main                                                         # main 分支触发

concurrency:                                                         # 并发控制
  group: deploy-ecs                                                  # 同组同一时间只运行一个
  cancel-in-progress: true                                           # 新任务触发时取消旧任务

jobs:                                                                # 任务集合
  deploy:                                                            # 任务名
    runs-on: ubuntu-latest                                           # 运行器环境

    steps:                                                           # 步骤列表
      - name: Checkout code                                          # 拉取代码
        uses: actions/checkout@v4                                    # 使用官方 checkout

      - name: Deploy via SSH                                         # 通过 SSH 部署
        uses: appleboy/ssh-action@v1.0.3                             # SSH Action
        with:                                                        # 参数
          host: ${{ secrets.ECS_HOST }}                               # ECS 地址（Secrets）
          username: ecs-user                                         # SSH 用户
          key: ${{ secrets.ECS_SSH_KEY }}                             # SSH 私钥（Secrets）
          port: 22                                                   # SSH 端口
          script_stop: true                                          # 出错就停
          script: |                                                  # 在 ECS 上执行的脚本
            set -e                                                   # 任一命令失败即退出
            cd /opt/mentory                                          # 进入仓库目录
            git fetch --all                                          # 拉远端更新
            git reset --hard origin/main                             # 强制对齐 main（避免冲突）
            cd /opt/mentory/backend                                  # 进入后端目录
            npm ci                                                   # 安装后端依赖
            npm run build                                            # 编译后端
            pm2 restart mentory-backend                              # 重启后端
            cd /opt/mentory/my-app                                   # 进入前端目录
            npm ci                                                   # 安装前端依赖
            npm run build                                            # 构建前端
            sudo rm -rf /var/www/mentory/*                           # 清空旧静态文件
            sudo cp -r build/* /var/www/mentory/                     # 覆盖新静态文件
            sudo systemctl reload nginx                              # 重载 Nginx
            curl -I http://127.0.0.1/ | head -n 1                    # 简单检查首页返回
            echo "✅ Deploy finished"                                # 输出完成信息

      - name: Install and configure Alibaba Cloud CLI                 # 安装并配置阿里云 CLI
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: |
          set -euo pipefail
          : "${ALIBABA_CLOUD_ACCESS_KEY_ID:?Missing GitHub secret ALIBABA_CLOUD_ACCESS_KEY_ID}"
          : "${ALIBABA_CLOUD_ACCESS_KEY_SECRET:?Missing GitHub secret ALIBABA_CLOUD_ACCESS_KEY_SECRET}"
          curl -fsSL https://aliyuncli.alicdn.com/install.sh -o aliyun-install.sh
          sudo bash aliyun-install.sh
          aliyun configure set \
            --mode AK \
            --region cn-hangzhou \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET"

      - name: Collect frontend static asset URLs                      # 收集前端静态资源 URL
        id: esa_assets
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          set -euo pipefail
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "$ECS_SSH_KEY" > "$key_file"
          chmod 600 "$key_file"

          asset_urls="$(
            ssh -i "$key_file" -o StrictHostKeyChecking=no -p 22 "ecs-user@$ECS_HOST" '
              set -e
              FRONTEND_BUILD_DIR="/opt/mentory/my-app/build"
              if [ ! -d "$FRONTEND_BUILD_DIR/static" ]; then
                FRONTEND_BUILD_DIR="/var/www/mentory"
              fi
              find "$FRONTEND_BUILD_DIR/static" -type f \( -name "*.js" -o -name "*.css" \) -printf "%p\n" \
                | sort \
                | sed "s#^$FRONTEND_BUILD_DIR/##" \
                | sed "s#^#https://mentory.cc/#"
            '
          )"

          echo "Static assets to preload:"
          printf '%s\n' "$asset_urls"

          {
            echo "urls<<EOF"
            printf '%s\n' "$asset_urls"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Purge and preload Alibaba Cloud ESA cache                # 刷新并预热 ESA 缓存
        env:
          ESA_SITE_ID: ${{ secrets.ESA_SITE_ID }}
          PRELOAD_URLS: ${{ steps.esa_assets.outputs.urls }}
        run: |
          set -euo pipefail
          : "${ESA_SITE_ID:?Missing GitHub secret ESA_SITE_ID}"

          purge_content="$(python3 -c 'import json; print(json.dumps({"Files":["https://mentory.cc/","https://mentory.cc/index.html"]}, separators=(",",":")))')"
          aliyun esa PurgeCaches \
            --SiteId "$ESA_SITE_ID" \
            --Type file \
            --Content "$purge_content"

          printf '%s\n' "$PRELOAD_URLS" | sed '/^[[:space:]]*$/d' > preload-urls.txt
          if [ ! -s preload-urls.txt ]; then
            echo "No static JS/CSS assets found to preload."
            exit 0
          fi

          split -l 100 preload-urls.txt preload-batch-
          for batch in preload-batch-*; do
            batch_urls="$(cat "$batch")"
            echo "Preloading static assets:"
            printf '%s\n' "$batch_urls"
            batch_content="$(python3 -c 'import json, sys; print(json.dumps([line.strip() for line in open(sys.argv[1], encoding="utf-8") if line.strip()], separators=(",",":")))' "$batch")"
            aliyun esa PreloadCaches \
              --SiteId "$ESA_SITE_ID" \
              --Content "$batch_content"
          done
